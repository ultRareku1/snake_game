<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0d10">
<title>贪吃蛇 · Snake</title>
<style>
  :root{
    --bg:#0b0d10;
    --board:#10141b;
    --panel:#14181f;
    --border:rgba(255,255,255,.07);
    --text:#e8eaed;
    --muted:#868d98;
    --accent:#34d399;
    --accent-strong:#6ee7b7;
    --accent-ink:#06281c;
    --food:#fb7185;
    --grid:rgba(255,255,255,.05);
    --eye:#0b0d10;
    --overlay:rgba(11,13,16,.62);
    --shadow:0 24px 70px rgba(0,0,0,.5);
  }
  [data-theme="light"]{
    --bg:#f3f5f7;
    --board:#ffffff;
    --panel:#ffffff;
    --border:rgba(15,23,42,.08);
    --text:#17202b;
    --muted:#6b7280;
    --accent:#10b981;
    --accent-strong:#059669;
    --accent-ink:#ffffff;
    --food:#f43f5e;
    --grid:rgba(15,23,42,.07);
    --eye:#ffffff;
    --overlay:rgba(243,245,247,.66);
    --shadow:0 24px 60px rgba(15,23,42,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    min-height:100vh;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    padding:28px 16px;
    background:var(--bg);
    background-image:radial-gradient(600px 300px at 50% -60px, color-mix(in srgb, var(--accent) 9%, transparent), transparent 70%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    transition:background-color .3s ease,color .3s ease;
  }
  .app{width:min(92vw,540px);display:flex;flex-direction:column;gap:16px}

  /* ── Header ─────────────────────────── */
  header{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{
    width:40px;height:40px;border-radius:12px;flex:none;
    background:var(--accent);display:grid;place-items:center;
    box-shadow:0 6px 18px color-mix(in srgb, var(--accent) 40%, transparent);
  }
  .titles h1{font-size:18px;font-weight:700;letter-spacing:.02em}
  .titles p{font-size:11px;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}
  .icon-row{display:flex;gap:8px}
  .icon-btn{
    width:38px;height:38px;border-radius:11px;border:1px solid var(--border);
    background:var(--panel);color:var(--muted);cursor:pointer;
    display:grid;place-items:center;transition:all .2s ease;
  }
  .icon-btn:hover{color:var(--accent);border-color:color-mix(in srgb, var(--accent) 50%, transparent)}
  .icon-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ── Scoreboard ─────────────────────── */
  .scores{display:flex;gap:10px}
  .chip{
    flex:1;display:flex;align-items:baseline;justify-content:space-between;
    background:var(--panel);border:1px solid var(--border);border-radius:14px;
    padding:10px 16px;transition:background-color .3s,border-color .3s;
  }
  .chip .label{font-size:12px;color:var(--muted);letter-spacing:.08em}
  .chip .value{
    font-size:22px;font-weight:700;color:var(--accent);
    font-variant-numeric:tabular-nums;transition:color .3s;
  }
  .chip .value.best{color:var(--text)}
  .value.pop{animation:pop .3s ease}
  @keyframes pop{40%{transform:scale(1.22)}100%{transform:scale(1)}}

  /* ── Board ──────────────────────────── */
  .board-wrap{
    position:relative;border-radius:22px;overflow:hidden;
    border:1px solid var(--border);background:var(--board);
    box-shadow:var(--shadow);aspect-ratio:1;transition:background-color .3s,border-color .3s;
  }
  canvas{display:block;width:100%;height:100%;touch-action:none}
  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;text-align:center;
    background:var(--overlay);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    padding:24px;opacity:1;visibility:visible;
    transition:opacity .25s ease,visibility .25s;
  }
  .overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
  .overlay h2{font-size:30px;font-weight:800;letter-spacing:.04em}
  .overlay .sub{font-size:13px;color:var(--muted);max-width:280px;line-height:1.7}
  .overlay .final{
    display:flex;gap:26px;margin:4px 0 2px;
    font-variant-numeric:tabular-nums;
  }
  .overlay .final div{display:flex;flex-direction:column;gap:2px}
  .overlay .final .num{font-size:30px;font-weight:800;color:var(--accent)}
  .overlay .final .lab{font-size:11px;color:var(--muted);letter-spacing:.12em}
  .badge{
    font-size:12px;font-weight:700;color:var(--accent-ink);
    background:var(--accent);border-radius:999px;padding:4px 14px;
    animation:pop .5s ease;
  }
  .btn{
    border:none;cursor:pointer;border-radius:999px;
    background:var(--accent);color:var(--accent-ink);
    font-size:14px;font-weight:700;letter-spacing:.06em;
    padding:13px 34px;transition:transform .15s ease,filter .2s;
  }
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:scale(.96)}
  .btn:focus-visible{outline:2px solid var(--accent-strong);outline-offset:3px}
  .overlay .keys{font-size:11px;color:var(--muted);letter-spacing:.05em}

  /* ── Controls ───────────────────────── */
  .controls{display:flex;flex-direction:column;align-items:center;gap:12px}
  .segmented{
    display:inline-flex;gap:4px;background:var(--panel);
    border:1px solid var(--border);border-radius:999px;padding:4px;
    transition:background-color .3s,border-color .3s;
  }
  .segmented button{
    border:none;background:transparent;color:var(--muted);cursor:pointer;
    font-size:13px;font-weight:600;padding:8px 20px;border-radius:999px;
    transition:all .2s ease;
  }
  .segmented button:hover{color:var(--text)}
  .segmented button.active{background:var(--accent);color:var(--accent-ink)}
  .segmented button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .hint{font-size:12px;color:var(--muted);letter-spacing:.05em;text-align:center}

  /* ── Mobile D-pad ───────────────────── */
  .dpad{display:none;grid-template-columns:repeat(3,64px);gap:8px;justify-content:center;margin-top:2px}
  .dpad button{
    height:56px;border-radius:14px;border:1px solid var(--border);
    background:var(--panel);color:var(--text);font-size:19px;cursor:pointer;
    touch-action:none;user-select:none;-webkit-user-select:none;transition:all .15s;
  }
  .dpad button:active{background:var(--accent);color:var(--accent-ink);transform:scale(.94)}
  .dpad .up{grid-column:2}
  .dpad .left{grid-column:1;grid-row:2}
  .dpad .down{grid-column:2;grid-row:2}
  .dpad .right{grid-column:3;grid-row:2}
  @media (pointer:coarse){ .dpad{display:grid} }

  @media (max-width:420px){
    .overlay h2{font-size:24px}
    .chip .value{font-size:19px}
  }
</style>
</head>
<body>
<main class="app">
  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M4 18c4 0 4-4 8-4s4 4 8 4" stroke="#06281c" stroke-width="2.6" stroke-linecap="round"/>
          <circle cx="19" cy="6.5" r="2.4" fill="#06281c"/>
        </svg>
      </div>
      <div class="titles">
        <h1>贪吃蛇</h1>
        <p>Snake Game</p>
      </div>
    </div>
    <div class="icon-row">
      <button class="icon-btn" id="btn-sound" aria-label="切换音效"></button>
      <button class="icon-btn" id="btn-theme" aria-label="切换主题"></button>
    </div>
  </header>

  <section class="scores">
    <div class="chip"><span class="label">分数</span><span class="value" id="score">0</span></div>
    <div class="chip"><span class="label">最高分</span><span class="value best" id="best">0</span></div>
  </section>

  <div class="board-wrap" id="wrap">
    <canvas id="board"></canvas>
    <div class="overlay" id="overlay"></div>
  </div>

  <section class="controls">
    <div class="segmented" id="segmented">
      <button data-tick="150">悠闲</button>
      <button data-tick="105" class="active">标准</button>
      <button data-tick="72">极速</button>
    </div>
    <p class="hint">↑ ↓ ← → 或 WASD 移动 · 空格 暂停 · 回车 重开</p>
  </section>

  <div class="dpad" id="dpad">
    <button class="up" data-dir="0,-1" aria-label="上">↑</button>
    <button class="left" data-dir="-1,0" aria-label="左">←</button>
    <button class="down" data-dir="0,1" aria-label="下">↓</button>
    <button class="right" data-dir="1,0" aria-label="右">→</button>
  </div>
</main>

<script>
(() => {
  'use strict';

  /* ── Constants & state ───────────────── */
  const GRID = 21;
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');

  let cell = 0, cssSize = 0;
  let snake = [], prevSnake = [], dir = {x:1, y:0}, queue = [];
  let food = null, score = 0, foods = 0;
  let best = +(localStorage.getItem('snake-best') || 0);
  let state = 'ready';               // ready | running | paused | over
  let baseTick = +(localStorage.getItem('snake-speed') || 105);
  let tickMs = baseTick, lastTick = 0;
  let muted = localStorage.getItem('snake-muted') === '1';
  let palette = {};

  /* ── Theme ───────────────────────────── */
  const root = document.documentElement;
  const storedTheme = localStorage.getItem('snake-theme');
  if (storedTheme) root.dataset.theme = storedTheme;
  else if (window.matchMedia('(prefers-color-scheme: light)').matches) root.dataset.theme = 'light';

  function refreshPalette() {
    const cs = getComputedStyle(root);
    palette = {
      board: cs.getPropertyValue('--board').trim(),
      grid: cs.getPropertyValue('--grid').trim(),
      accent: cs.getPropertyValue('--accent').trim(),
      accentStrong: cs.getPropertyValue('--accent-strong').trim(),
      food: cs.getPropertyValue('--food').trim(),
      eye: cs.getPropertyValue('--eye').trim(),
    };
    document.querySelector('meta[name="theme-color"]').content =
      cs.getPropertyValue('--bg').trim();
  }

  const ICONS = {
    sun: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    moon: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>',
    soundOn: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M18.5 5.5a9 9 0 0 1 0 13"/></svg>',
    soundOff: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>'
  };
  const btnTheme = document.getElementById('btn-theme');
  const btnSound = document.getElementById('btn-sound');

  function syncIcons() {
    btnTheme.innerHTML = root.dataset.theme === 'dark' ? ICONS.sun : ICONS.moon;
    btnSound.innerHTML = muted ? ICONS.soundOff : ICONS.soundOn;
  }

  btnTheme.addEventListener('click', () => {
    root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('snake-theme', root.dataset.theme);
    refreshPalette(); syncIcons();
  });
  btnSound.addEventListener('click', () => {
    muted = !muted;
    localStorage.setItem('snake-muted', muted ? '1' : '0');
    syncIcons();
  });

  /* ── Audio (tiny WebAudio blips) ─────── */
  let actx = null;
  function blip(freq, dur, type = 'sine', vol = .1, slide = 0) {
    if (muted) return;
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      if (actx.state === 'suspended') actx.resume();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, actx.currentTime);
      if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
      g.gain.setValueAtTime(vol, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(.0001, actx.currentTime + dur);
      o.connect(g).connect(actx.destination);
      o.start(); o.stop(actx.currentTime + dur);
    } catch (e) { /* audio unavailable */ }
  }

  /* ── Sizing ──────────────────────────── */
  function resize() {
    cssSize = canvas.clientWidth || wrap.clientWidth;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(cssSize * dpr);
    canvas.height = Math.round(cssSize * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cell = cssSize / GRID;
  }
  new ResizeObserver(resize).observe(wrap);
  window.addEventListener('resize', resize);

  /* ── Game logic ──────────────────────── */
  function init() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    prevSnake = snake.map(p => ({...p}));
    dir = {x:1, y:0}; queue = [];
    score = 0; foods = 0; tickMs = baseTick;
    placeFood(); updateScore(false);
  }

  function placeFood() {
    let p;
    do {
      p = { x: (Math.random()*GRID)|0, y: (Math.random()*GRID)|0 };
    } while (snake.some(s => s.x===p.x && s.y===p.y));
    food = p;
  }

  function setDir(nx, ny) {
    const last = queue.length ? queue[queue.length-1] : dir;
    if (nx === -last.x && ny === -last.y) return;   // no 180° turns
    if (nx === last.x && ny === last.y) return;
    if (queue.length < 2) queue.push({x:nx, y:ny});
  }

  function step() {
    prevSnake = snake.map(p => ({...p}));
    if (queue.length) dir = queue.shift();
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    const hitWall = head.x<0 || head.y<0 || head.x>=GRID || head.y>=GRID;
    const eating = food && head.x===food.x && head.y===food.y;
    const body = eating ? snake : snake.slice(0, -1);
    if (hitWall || body.some(s => s.x===head.x && s.y===head.y)) return gameOver();

    snake.unshift(head);
    if (eating) {
      score += 10; foods++;
      tickMs = Math.max(baseTick * .55, baseTick - foods * 1.6);
      placeFood(); updateScore(true);
      blip(720, .09, 'sine', .12, 260);
    } else {
      snake.pop();
    }
  }

  function start() {
    if (state === 'running') return;
    if (state === 'over' || state === 'ready') init();
    prevSnake = snake.map(p => ({...p}));
    lastTick = performance.now();
    state = 'running';
    hideOverlay();
  }

  function pause() {
    if (state !== 'running') return;
    state = 'paused';
    showOverlay(`
      <h2>已暂停</h2>
      <p class="sub">休息一下，蛇也需要喘口气。</p>
      <button class="btn" id="ov-btn">继续游戏</button>
      <p class="keys">按 空格 继续</p>`);
  }

  function gameOver() {
    state = 'over';
    const isBest = score > best;
    if (isBest) {
      best = score;
      localStorage.setItem('snake-best', best);
      bestEl.textContent = best;
    }
    blip(320, .35, 'triangle', .12, -220);
    setTimeout(() => blip(180, .4, 'triangle', .1, -100), 120);
    showOverlay(`
      <h2>游戏结束</h2>
      ${isBest && score > 0 ? '<span class="badge">新纪录 🎉</span>' : ''}
      <div class="final">
        <div><span class="num">${score}</span><span class="lab">得分</span></div>
        <div><span class="num">${best}</span><span class="lab">最高</span></div>
      </div>
      <button class="btn" id="ov-btn">重新开始</button>
      <p class="keys">按 回车 重新开始</p>`);
  }

  function updateScore(pop) {
    scoreEl.textContent = score;
    bestEl.textContent = best;
    if (pop) {
      scoreEl.classList.remove('pop');
      void scoreEl.offsetWidth;
      scoreEl.classList.add('pop');
    }
  }

  /* ── Overlay ─────────────────────────── */
  function showOverlay(html) {
    overlay.innerHTML = html;
    overlay.classList.remove('hidden');
    const b = document.getElementById('ov-btn');
    if (b) b.addEventListener('click', () => { state === 'paused' ? resume() : start(); });
  }
  function hideOverlay() { overlay.classList.add('hidden'); }
  function resume() {
    prevSnake = snake.map(p => ({...p}));
    lastTick = performance.now();
    state = 'running';
    hideOverlay();
  }

  function showReady() {
    showOverlay(`
      <h2>贪吃蛇</h2>
      <p class="sub">吃掉食物，不断变长。<br>小心墙壁和自己的尾巴。</p>
      <button class="btn" id="ov-btn">开始游戏</button>
      <p class="keys">方向键 / WASD 也可以直接开始</p>`);
  }

  /* ── Rendering ───────────────────────── */
  function render(now) {
    const t = state === 'running' ? Math.min((now - lastTick) / tickMs, 1) : 1;

    ctx.fillStyle = palette.board;
    ctx.fillRect(0, 0, cssSize, cssSize);

    // grid
    ctx.strokeStyle = palette.grid;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 1; i < GRID; i++) {
      const p = i * cell + .5;
      ctx.moveTo(p, 0); ctx.lineTo(p, cssSize);
      ctx.moveTo(0, p); ctx.lineTo(cssSize, p);
    }
    ctx.stroke();

    // food (pulsing dot)
    if (food) {
      const fx = (food.x + .5) * cell, fy = (food.y + .5) * cell;
      const r = cell * .27 * (1 + .13 * Math.sin(now / 280));
      ctx.save();
      ctx.shadowColor = palette.food;
      ctx.shadowBlur = 14;
      ctx.fillStyle = palette.food;
      ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // snake — smooth interpolated polyline
    const pts = snake.map((s, i) => {
      const pi = i === 0 ? 0 : i - 1;
      const p = prevSnake[Math.min(pi, Math.max(prevSnake.length - 1, 0))] || s;
      return {
        x: (p.x + (s.x - p.x) * t + .5) * cell,
        y: (p.y + (s.y - p.y) * t + .5) * cell
      };
    });

    if (pts.length) {
      ctx.save();
      ctx.strokeStyle = palette.accent;
      ctx.lineWidth = cell * .62;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = palette.accent;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();
      ctx.restore();

      // head
      const h = pts[0];
      ctx.fillStyle = palette.accentStrong;
      ctx.beginPath(); ctx.arc(h.x, h.y, cell * .42, 0, Math.PI * 2); ctx.fill();

      // eyes
      const fx2 = dir.x, fy2 = dir.y, px = -fy2, py = fx2;
      const eo = cell * .17, fo = cell * .15, er = cell * .075;
      ctx.fillStyle = palette.eye;
      for (const s of [1, -1]) {
        ctx.beginPath();
        ctx.arc(h.x + fx2 * fo + px * eo * s, h.y + fy2 * fo + py * eo * s, er, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  /* ── Main loop ───────────────────────── */
  function loop(now) {
    requestAnimationFrame(loop);
    if (state === 'running') {
      let guard = 0;
      while (now - lastTick >= tickMs && guard++ < 8) {
        lastTick += tickMs;
        step();
        if (state !== 'running') break;
      }
    }
    render(now);
  }

  /* ── Input ───────────────────────────── */
  const KEYS = {
    ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
    w:[0,-1], s:[0,1], a:[-1,0], d:[1,0], W:[0,-1], S:[0,1], A:[-1,0], D:[1,0]
  };
  window.addEventListener('keydown', e => {
    if (KEYS[e.key]) {
      e.preventDefault();
      const [nx, ny] = KEYS[e.key];
      if (state === 'ready' || state === 'over') start();
      else if (state === 'paused') resume();
      setDir(nx, ny);
    } else if (e.key === ' ') {
      e.preventDefault();
      if (state === 'running') pause();
      else if (state === 'paused') resume();
      else start();
    } else if (e.key === 'Enter') {
      if (state === 'over' || state === 'ready') start();
    }
  });

  // swipe
  let touchStart = null;
  wrap.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, {passive:true});
  wrap.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    touchStart = null;
    if (Math.hypot(dx, dy) < 24) {
      if (state === 'ready' || state === 'over') start();
      return;
    }
    const [nx, ny] = Math.abs(dx) > Math.abs(dy) ? [Math.sign(dx), 0] : [0, Math.sign(dy)];
    if (state === 'ready' || state === 'over') start();
    else if (state === 'paused') resume();
    setDir(nx, ny);
  }, {passive:true});

  // d-pad
  document.getElementById('dpad').addEventListener('pointerdown', e => {
    const b = e.target.closest('button[data-dir]');
    if (!b) return;
    e.preventDefault();
    const [nx, ny] = b.dataset.dir.split(',').map(Number);
    if (state === 'ready' || state === 'over') start();
    else if (state === 'paused') resume();
    setDir(nx, ny);
  });

  // difficulty
  const seg = document.getElementById('segmented');
  [...seg.children].forEach(b => {
    if (+b.dataset.tick === baseTick) {
      [...seg.children].forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    }
    b.addEventListener('click', () => {
      [...seg.children].forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      baseTick = +b.dataset.tick;
      localStorage.setItem('snake-speed', baseTick);
      tickMs = Math.max(baseTick * .55, baseTick - foods * 1.6);
    });
  });

  // auto-pause when tab hidden
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state === 'running') pause();
  });

  /* ── Boot ────────────────────────────── */
  refreshPalette(); syncIcons();
  resize(); init(); showReady();
  bestEl.textContent = best;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
